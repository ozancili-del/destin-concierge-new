
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Best Restaurants Near Pelican Beach Resort — Destin FL</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, sans-serif; background: #0a1628; color: white; height: 100vh; display: flex; flex-direction: column; }
  #map { flex: 1; position: relative; overflow: hidden; }
  canvas { position: absolute; top: 0; left: 0; cursor: grab; }
  canvas:active { cursor: grabbing; }
  #header { background: linear-gradient(135deg, #0d1b2a, #1a2f4a); padding: 10px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid rgba(255,255,255,0.08); flex-shrink: 0; }
  #header .title { font-size: 13px; font-weight: bold; color: #e0f0ff; letter-spacing: 0.5px; }
  #header .sub { font-size: 11px; color: rgba(255,255,255,0.45); margin-top: 1px; }
  .dot-home { width: 10px; height: 10px; border-radius: 50%; background: #00d4ff; flex-shrink: 0; box-shadow: 0 0 6px #00d4ff; }
  #panel { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(180deg, rgba(10,22,40,0.0) 0%, rgba(10,22,40,0.97) 18%); padding: 40px 16px 16px; z-index: 10; pointer-events: none; }
  #panel-card { background: rgba(13,27,42,0.96); border: 1px solid rgba(255,255,255,0.12); border-radius: 12px; padding: 16px 18px; pointer-events: all; display: none; backdrop-filter: blur(8px); position: relative; }
  #panel-card.visible { display: block; }
  #panel-name { font-size: 16px; font-weight: bold; color: #fff; margin-bottom: 4px; }
  #panel-type { font-size: 11px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
  #panel-desc { font-size: 13px; color: rgba(255,255,255,0.65); line-height: 1.6; margin-bottom: 12px; }
  #panel-link { display: inline-block; font-size: 12px; font-weight: bold; color: #00b4d8; text-decoration: none; border: 1px solid rgba(0,180,216,0.35); border-radius: 6px; padding: 6px 14px; }
  #panel-close { position: absolute; top: 12px; right: 14px; font-size: 18px; color: rgba(255,255,255,0.4); cursor: pointer; }
  #legend { position: absolute; top: 10px; right: 10px; background: rgba(13,27,42,0.88); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 10px 13px; font-size: 11px; z-index: 10; }
  .legend-row { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; color: rgba(255,255,255,0.7); }
  .legend-row:last-child { margin-bottom: 0; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  #zoom { position: absolute; bottom: 180px; right: 10px; display: flex; flex-direction: column; gap: 2px; z-index: 10; }
  .zoom-btn { width: 32px; height: 32px; background: rgba(13,27,42,0.88); border: 1px solid rgba(255,255,255,0.15); border-radius: 6px; color: white; font-size: 18px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; user-select: none; }
  .zoom-btn:hover { background: rgba(0,150,199,0.3); }
</style>
</head>
<body>
<div id="header">
  <div class="dot-home"></div>
  <div>
    <div class="title">Best Restaurants Near Pelican Beach Resort-Zoom in and out to see more :) </div>
    <div class="sub">Tap any pin to explore &mdash; Destin, FL</div>
  </div>
</div>
<div id="map">
  <canvas id="canvas"></canvas>
  <div id="legend">
    <div class="legend-row"><div class="legend-dot" style="background:#00d4ff;box-shadow:0 0 5px #00d4ff;"></div>Pelican Beach Resort</div>
    <div class="legend-row"><div class="legend-dot" style="background:#ff6b6b;"></div>Seafood</div>
    <div class="legend-row"><div class="legend-dot" style="background:#ffd93d;"></div>Sushi / Asian</div>
    <div class="legend-row"><div class="legend-dot" style="background:#a78bfa;"></div>Italian</div>
    <div class="legend-row"><div class="legend-dot" style="background:#6bde8f;"></div>American / Pub</div>
    <div class="legend-row"><div class="legend-dot" style="background:#f97316;"></div>Brunch / Upscale</div>
  </div>
  <div id="zoom">
    <div class="zoom-btn" id="zoomIn">+</div>
    <div class="zoom-btn" id="zoomOut">−</div>
  </div>
  <div id="panel">
    <div id="panel-card">
      <span id="panel-close">&times;</span>
      <div id="panel-name"></div>
      <div id="panel-type"></div>
      <div id="panel-desc"></div>
      <a id="panel-link" href="#" target="_blank" rel="noopener">Visit Website &rarr;</a>
    </div>
  </div>
</div>
<script>
const R=[
  {name:"Pelican Beach Resort",type:"HOME BASE",typeColor:"#00d4ff",lat:30.3845948,lng:-86.4745738,desc:"Your home base — Unit 707 & Unit 1006. Step off the elevator onto the Gulf. All restaurants are within 15 minutes.",url:"https://www.destincondogetaways.com",pinColor:"#00d4ff",pinGlow:true,isHome:true},
  // SEAFOOD
  {name:"Dewey Destin's Seafood Restaurant",type:"SEAFOOD · 4.5★ (4.4K)",typeColor:"#ff6b6b",lat:30.3974616,lng:-86.5150988,desc:"A Destin institution — locals go here. Fresh catch daily, waterfront on the bayou. Order the grouper. No frills, just great fish at fair prices.",url:"https://www.destinseafood.com/",pinColor:"#ff6b6b"},
  {name:"Dewey Destin's Harborside",type:"SEAFOOD · 4.4★ (4.1K)",typeColor:"#ff6b6b",lat:30.3925,lng:-86.5005,desc:"The harbor location of the Dewey's brand — different vibe from the bayou original. Waterfront harbor views, same great seafood. Great for watching the boats.",url:"https://www.destinseafood.com/",pinColor:"#ff6b6b"},
  {name:"Brotula's Seafood House & Steamer",type:"SEAFOOD · 4.4★ (5K)",typeColor:"#ff6b6b",lat:30.3935056,lng:-86.5068515,desc:"Harbor location with excellent steamed seafood buckets. Crab legs and shrimp are consistently great. A favorite for families.",url:"https://www.brotulas.com/",pinColor:"#ff6b6b"},
  {name:"The Edge Seafood & SkyBar",type:"SEAFOOD · 4.7★ (5.3K)",typeColor:"#ff6b6b",lat:30.3930,lng:-86.5005,desc:"Destin Harbor rooftop with panoramic views. Fresh Gulf seafood, great cocktails, one of the best sunset spots in town. The SkyBar is worth the trip alone.",url:"https://edgeseafood.com/",pinColor:"#ff6b6b"},
  {name:"AJ's Seafood & Oyster Bar",type:"SEAFOOD · 4.0★ (8K)",typeColor:"#ff6b6b",lat:30.3920,lng:-86.4978,desc:"A Destin Harbor landmark — one of the most visited spots on the harbor. Casual, lively, great for oysters and cold drinks. Always busy for a reason.",url:"https://ajsdestin.com/",pinColor:"#ff6b6b"},
  {name:"The Back Porch Seafood & Oyster House",type:"SEAFOOD · 4.5★ (12K)",typeColor:"#ff6b6b",lat:30.3876505,lng:-86.4374719,desc:"Iconic beachfront deck — fresh oysters, grouper sandwiches, cold drinks with sand under your feet. A Destin classic since 1974. 12K reviews say it all.",url:"https://www.theback-porch.com/",pinColor:"#ff6b6b"},
  {name:"Louisiana Lagniappe",type:"SEAFOOD / CREOLE · 4.7★ (3K)",typeColor:"#ff6b6b",lat:30.3908,lng:-86.4620,desc:"Upscale Gulf-front dining with a Creole twist. One of Destin's most romantic spots. Crab claws and Gulf shrimp are exceptional. Reservations recommended.",url:"https://www.thelouisianalagniappe.com/",pinColor:"#ff6b6b"},
  {name:"Crab Trap Destin",type:"SEAFOOD · 4.3★ (8.8K)",typeColor:"#ff6b6b",lat:30.3868,lng:-86.4250,desc:"Beachfront on Scenic Hwy 98 with nearly 9K reviews. Casual atmosphere, solid Gulf seafood, good for families. One of the most visited spots on the Emerald Coast.",url:"https://www.crabtrapflorida.com/",pinColor:"#ff6b6b"},
  {name:"Pompano Joe's",type:"SEAFOOD · 4.4★ (8.4K)",typeColor:"#ff6b6b",lat:30.3880,lng:-86.3695,desc:"Beachfront in Miramar Beach with a huge outdoor deck. Great happy hour, solid seafood, laid-back Gulf-view atmosphere. Popular for lunch and sunset drinks.",url:"https://www.pompano-joes.com/",pinColor:"#ff6b6b"},
  {name:"LuLu's Destin",type:"SEAFOOD · 4.2★ (6.7K)",typeColor:"#ff6b6b",lat:30.3912,lng:-86.3960,desc:"Jimmy Buffett's sister owns it — quintessential Florida beach restaurant at Legendary Marina. Great for families, live music, and a laid-back vibe. A must-stop.",url:"https://lulusfunfoodmusic.com/",pinColor:"#ff6b6b"},
  // SUSHI / ASIAN
  {name:"Osaka Japanese Hibachi & Sushi Bar",type:"SUSHI / ASIAN",typeColor:"#ffd93d",lat:30.3846184,lng:-86.3874705,desc:"Best hibachi in Destin — great for groups and families. The teppanyaki experience is a fun change of pace from seafood.",url:"https://www.theosakasteakhouse.com/",pinColor:"#ffd93d"},
  {name:"Jackacuda's Seafood & Sushi",type:"SUSHI / ASIAN",typeColor:"#ffd93d",lat:30.3869924,lng:-86.4083436,desc:"Solid sushi plus fresh local seafood. Lively bar scene, creative rolls, and reliable Gulf fish options.",url:"https://www.jackacudas.com/",pinColor:"#ffd93d"},
  {name:"Sushimoto",type:"SUSHI / ASIAN",typeColor:"#ffd93d",lat:30.3843038,lng:-86.3765422,desc:"Destin's go-to for quality sushi. Fresh, consistent, worth the drive east. Great omakase options.",url:"https://www.destinsushi.com/",pinColor:"#ffd93d"},
  // ITALIAN
  {name:"Mimmo's Ristorante Italiano",type:"ITALIAN",typeColor:"#a78bfa",lat:30.3891472,lng:-86.4788222,desc:"Closest Italian to Pelican Beach. Authentic Sicilian-style — housemade pasta, wood-fired dishes, warm atmosphere.",url:"https://mimmos.com/",pinColor:"#a78bfa"},
  {name:"Nonna's Ristorante",type:"ITALIAN",typeColor:"#a78bfa",lat:30.3920,lng:-86.5045,desc:"Authentic Italian on the Destin Harbor. Housemade pasta, wood-fired dishes, excellent wine list. A perfect break from seafood done right.",url:"https://nonnasristorante.com/",pinColor:"#a78bfa"},
  {name:"Pazzo Italiano",type:"ITALIAN",typeColor:"#a78bfa",lat:30.3967,lng:-86.4558,desc:"Ozan's personal favorite. Naples-imported wood-fired oven, housemade pasta, family recipes perfected over 20+ years.The complimentary garlic bread alone is worth the trip. Reservations recommended for 5+.",url:"https://www.pazzodestin.com/",pinColor:"#a78bfa"},
  // AMERICAN / PUB
  {name:"McGuire's Irish Pub",type:"AMERICAN / PUB · 4.7★ (23K)",typeColor:"#6bde8f",lat:30.4172613,lng:-86.6062291,desc:"A legendary Destin institution with 23K reviews. Steaks, burgers, craft beer, and dollar bills stapled to the ceiling. Worth the drive for the experience alone.",url:"https://www.mcguiresirishpub.com/",pinColor:"#6bde8f"},
  {name:"Fudpucker's Beachside Bar & Grill",type:"AMERICAN / FAMILY · 4.7★ (33K)",typeColor:"#6bde8f",lat:30.3908,lng:-86.3980,desc:"Destin's most reviewed restaurant — 33K strong. Massive beachside complex, great for families. Alligator shows, arcade, full bar. Gator bites are a must.",url:"https://www.fudpucker.com/",pinColor:"#6bde8f"},
  {name:"The Harbor Tavern",type:"AMERICAN / PUB · 4.7★ (887)",typeColor:"#6bde8f",lat:30.3928,lng:-86.5010,desc:"Casual harbor-side bar with a loyal following. Great for a cold beer watching the boats come in. Solid burgers, wings, genuine locals vibe.",url:"https://theharbortavern.com/",pinColor:"#6bde8f"},
  // BRUNCH / UPSCALE
  {name:"Beach Walk Café",type:"UPSCALE / BEACHFRONT",typeColor:"#f97316",lat:30.3959827,lng:-86.512016,desc:"Upscale beachfront dining at Henderson Park Inn. Beautiful setting, refined menu, great for a special dinner. Reservations strongly recommended.",url:"https://www.hendersonparkinn.com/dine/beachwalk-cafe/",pinColor:"#f97316"},
  {name:"Ruby Slipper",type:"BRUNCH",typeColor:"#f97316",lat:30.3908,lng:-86.3870,desc:"New Orleans-style brunch — one of the best breakfast spots in the area. Eggs Benedict variations, bananas foster French toast. Expect a wait on weekends.",url:"https://rubybrunch.com/",pinColor:"#f97316"},
  {name:"Crackings",type:"BREAKFAST · 4.7★ (2K)",typeColor:"#f97316",lat:30.3912,lng:-86.4680,desc:"Best breakfast in Destin — locals and guests both swear by it. Hearty portions, great coffee, friendly staff. Opens 7am, gets busy fast. Go early.",url:"https://www.crackingsfl.com/",pinColor:"#f97316"},
];

const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
let offsetX=0,offsetY=0,scale=1,zoom=14;
let isDragging=false,dragStartX=0,dragStartY=0,dragStartOX=0,dragStartOY=0;
let activePin=null,hoveredPin=null;
const TILE_SIZE=256;

function resize(){canvas.width=canvas.parentElement.offsetWidth;canvas.height=canvas.parentElement.offsetHeight;draw();}
function latLngToTile(lat,lng,z){const n=Math.pow(2,z),x=(lng+180)/360*n,lr=lat*Math.PI/180,y=(1-Math.log(Math.tan(lr)+1/Math.cos(lr))/Math.PI)/2*n;return{x,y};}
function getCenter(){return{lat:30.3845948,lng:-86.4745738};}
function worldToScreen(lat,lng){const c=getCenter(),ct=latLngToTile(c.lat,c.lng,zoom),pt=latLngToTile(lat,lng,zoom),cx=canvas.width/2+offsetX,cy=canvas.height/2+offsetY;return{x:cx+(pt.x-ct.x)*TILE_SIZE*scale,y:cy+(pt.y-ct.y)*TILE_SIZE*scale};}

const tileCache={};
function getTile(x,y,z){const k=`${z}/${x}/${y}`;if(tileCache[k])return tileCache[k];const img=new Image(),s=Math.floor(Math.random()*4);img.src=`https://mt${s}.google.com/vt/lyrs=s&x=${x}&y=${y}&z=${z}`;img.crossOrigin='anonymous';img.onload=()=>{tileCache[k]=img;draw();};tileCache[k]=null;return null;}

function draw(){
  if(!canvas.width)return;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#0a1628';ctx.fillRect(0,0,canvas.width,canvas.height);
  const c=getCenter(),ct=latLngToTile(c.lat,c.lng,zoom),cx=canvas.width/2+offsetX,cy=canvas.height/2+offsetY,tw=TILE_SIZE*scale;
  const x0=Math.floor(ct.x-cx/tw),y0=Math.floor(ct.y-cy/tw),x1=Math.ceil(ct.x+(canvas.width-cx)/tw),y1=Math.ceil(ct.y+(canvas.height-cy)/tw);
  for(let tx=x0;tx<=x1;tx++)for(let ty=y0;ty<=y1;ty++){const img=getTile(tx,ty,zoom),sx=cx+(tx-ct.x)*tw,sy=cy+(ty-ct.y)*tw;if(img)ctx.drawImage(img,sx,sy,tw,tw);else{ctx.fillStyle='#0d1f35';ctx.fillRect(sx,sy,tw,tw);}}
  ctx.fillStyle='rgba(5,15,30,0.38)';ctx.fillRect(0,0,canvas.width,canvas.height);
  R.forEach((r,i)=>{
    const{x,y}=worldToScreen(r.lat,r.lng);
    if(x<-40||x>canvas.width+40||y<-40||y>canvas.height+40)return;
    const isA=activePin===i,isH=hoveredPin===i,pr=r.isHome?10:8,bump=(isA||isH)?2:0;
    if(r.pinGlow||isA){const g=ctx.createRadialGradient(x,y,0,x,y,pr+10);g.addColorStop(0,r.pinColor+'66');g.addColorStop(1,'transparent');ctx.beginPath();ctx.arc(x,y,pr+10,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();}
    ctx.beginPath();ctx.arc(x,y,pr+bump,0,Math.PI*2);ctx.fillStyle=r.pinColor;ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.9)';ctx.lineWidth=r.isHome?2.5:1.5;ctx.stroke();
    if(!r.isHome){ctx.fillStyle='#fff';ctx.font=`bold ${isA?11:10}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(i,x,y);}
    if(isA||isH||r.isHome){const label=r.isHome?'Pelican Beach':r.name.split(' ').slice(0,3).join(' ');ctx.font='bold 11px Arial';const tw2=ctx.measureText(label).width,lx=x-tw2/2-5,ly=y-pr-bump-20;ctx.fillStyle='rgba(10,22,40,0.88)';ctx.beginPath();if(ctx.roundRect)ctx.roundRect(lx,ly-2,tw2+10,16,4);else ctx.rect(lx,ly-2,tw2+10,16);ctx.fill();ctx.fillStyle=r.isHome?'#00d4ff':'#ffffff';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(label,x,ly+6);}
  });
}

function getPinAt(mx,my){for(let i=0;i<R.length;i++){const{x,y}=worldToScreen(R[i].lat,R[i].lng);if(Math.sqrt((mx-x)**2+(my-y)**2)<18)return i;}return null;}
function showPanel(idx){const r=R[idx];activePin=idx;document.getElementById('panel-name').textContent=r.name;const t=document.getElementById('panel-type');t.textContent=r.type;t.style.color=r.typeColor;document.getElementById('panel-desc').textContent=r.desc;const l=document.getElementById('panel-link');l.href=r.url;l.style.color=r.typeColor;l.style.borderColor=r.typeColor+'55';document.getElementById('panel-card').classList.add('visible');draw();}
function hidePanel(){activePin=null;document.getElementById('panel-card').classList.remove('visible');draw();}

canvas.addEventListener('mousedown',e=>{const rect=canvas.getBoundingClientRect(),mx=e.clientX-rect.left,my=e.clientY-rect.top,pin=getPinAt(mx,my);if(pin!==null){showPanel(pin);return;}isDragging=true;dragStartX=e.clientX;dragStartY=e.clientY;dragStartOX=offsetX;dragStartOY=offsetY;});
canvas.addEventListener('mousemove',e=>{const rect=canvas.getBoundingClientRect(),mx=e.clientX-rect.left,my=e.clientY-rect.top;if(isDragging){offsetX=dragStartOX+(e.clientX-dragStartX);offsetY=dragStartOY+(e.clientY-dragStartY);draw();return;}const pin=getPinAt(mx,my);canvas.style.cursor=pin!==null?'pointer':'grab';if(pin!==hoveredPin){hoveredPin=pin;draw();}});
canvas.addEventListener('mouseup',()=>{isDragging=false;});
canvas.addEventListener('mouseleave',()=>{isDragging=false;hoveredPin=null;draw();});
let ltd=null;
canvas.addEventListener('touchstart',e=>{if(e.touches.length===1){const t=e.touches[0],rect=canvas.getBoundingClientRect(),pin=getPinAt(t.clientX-rect.left,t.clientY-rect.top);if(pin!==null){showPanel(pin);return;}isDragging=true;dragStartX=t.clientX;dragStartY=t.clientY;dragStartOX=offsetX;dragStartOY=offsetY;}},{passive:true});
canvas.addEventListener('touchmove',e=>{if(e.touches.length===1&&isDragging){const t=e.touches[0];offsetX=dragStartOX+(t.clientX-dragStartX);offsetY=dragStartOY+(t.clientY-dragStartY);draw();}if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY,dist=Math.sqrt(dx*dx+dy*dy);if(ltd){scale=Math.max(0.5,Math.min(4,scale*dist/ltd));draw();}ltd=dist;}},{passive:true});
canvas.addEventListener('touchend',()=>{isDragging=false;ltd=null;});
canvas.addEventListener('wheel',e=>{e.preventDefault();scale=Math.max(0.4,Math.min(5,scale*(e.deltaY<0?1.15:0.87)));draw();},{passive:false});
document.getElementById('zoomIn').addEventListener('click',()=>{zoom=Math.min(zoom+1,17);scale=1;offsetX=0;offsetY=0;draw();});
document.getElementById('zoomOut').addEventListener('click',()=>{zoom=Math.max(zoom-1,10);scale=1;offsetX=0;offsetY=0;draw();});
document.getElementById('panel-close').addEventListener('click',hidePanel);
window.addEventListener('resize',resize);
resize();
</script>
</body>
</html>
