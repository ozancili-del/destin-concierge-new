      </svg>`
    ),
    scaledSize: new google.maps.Size(24, 24),
    anchor: new google.maps.Point(12, 12),
  };
}

// ── Init map ──────────────────────────────────────────────────────────────────
function initMap() {
  map = new google.maps.Map(document.getElementById("map"), {
    center: { lat: 30.3845948, lng: -86.4745738 },
    zoom: 14,
    mapTypeId: "satellite",
    mapTypeControl: false,
    streetViewControl: false,
    fullscreenControl: false,
    zoomControlOptions: {
      position: google.maps.ControlPosition.RIGHT_CENTER,
    },
    styles: [],
  });

  R.forEach((r, i) => {
    const marker = new google.maps.Marker({
      position: { lat: r.lat, lng: r.lng },
      map,
      title: r.name,
      icon: makePinSvg(r.pinColor, r.isHome, r.isHome ? null : i),
      zIndex: r.isHome ? 999 : i,
    });

    marker.addListener("click", () => showPanel(r, marker));
    markers.push({ marker, data: r });
  });
}

// ── Show bottom panel ─────────────────────────────────────────────────────────
function showPanel(r, marker) {
  document.getElementById("panel-name").textContent = r.name;
  const t = document.getElementById("panel-type");
  t.textContent = r.type;
  t.style.color = r.typeColor;
  document.getElementById("panel-desc").textContent = r.desc;

  const link = document.getElementById("panel-link");
  link.href = r.url;
  link.style.color = r.typeColor;
  link.style.borderColor = r.typeColor + "55";

  const dir = document.getElementById("panel-directions");
  if (r.isHome) {
    dir.style.display = "none";
  } else {
    dir.style.display = "inline-block";
    dir.href = `https://www.google.com/maps/dir/?api=1&destination=${r.lat},${r.lng}`;
  }

  document.getElementById("panel-card").classList.add("visible");

  // Pan map so pin is visible above the panel
  map.panTo({ lat: r.lat + 0.003, lng: r.lng });
}

function hidePanel() {
  document.getElementById("panel-card").classList.remove("visible");
}

// ── Filter logic ──────────────────────────────────────────────────────────────
function applyFilter(cat) {
  activeFilter = cat;
  markers.forEach(({ marker, data }) => {
    const visible = cat === "all" || data.cat === cat || data.isHome;
    marker.setVisible(visible);
  });
  hidePanel();
}

document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    applyFilter(btn.dataset.cat);
  });
});

document.getElementById("panel-close").addEventListener("click", hidePanel);
</script>
