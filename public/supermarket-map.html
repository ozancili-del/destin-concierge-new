
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Grocery Stores Near Pelican Beach Resort — Destin FL</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, sans-serif; background: #0a1628; color: white; height: 100vh; display: flex; flex-direction: column; }
  #header { background: linear-gradient(135deg, #0d1b2a, #1a2f4a); padding: 10px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid rgba(255,255,255,0.08); flex-shrink: 0; }
  #header .title { font-size: 13px; font-weight: bold; color: #e0f0ff; letter-spacing: 0.5px; }
  #header .sub { font-size: 11px; color: rgba(255,255,255,0.45); margin-top: 1px; }
  .dot-home { width: 10px; height: 10px; border-radius: 50%; background: #00d4ff; flex-shrink: 0; box-shadow: 0 0 6px #00d4ff; }
  #filters { background: rgba(13,27,42,0.95); border-bottom: 1px solid rgba(255,255,255,0.06); padding: 8px 12px; display: flex; gap: 6px; flex-shrink: 0; overflow-x: auto; scrollbar-width: none; }
  #filters::-webkit-scrollbar { display: none; }
  .filter-btn { padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; cursor: pointer; border: 1px solid rgba(255,255,255,0.15); background: transparent; color: rgba(255,255,255,0.55); white-space: nowrap; transition: all 0.15s; letter-spacing: 0.5px; }
  .filter-btn:hover { background: rgba(255,255,255,0.08); color: white; }
  .filter-btn.active { color: #0a1628; border-color: transparent; }
  .filter-btn[data-cat="all"].active      { background: #00d4ff; }
  .filter-btn[data-cat="chain"].active    { background: #6bde8f; }
  .filter-btn[data-cat="premium"].active  { background: #f97316; }
  .filter-btn[data-cat="local"].active    { background: #e879a0; }
  .filter-btn[data-cat="warning"].active  { background: #ffd93d; color: #0a1628; }
  #map-container { flex: 1; position: relative; }
  #map { width: 100%; height: 100%; }
  #legend { position: absolute; top: 10px; right: 10px; background: rgba(13,27,42,0.92); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 10px 13px; font-size: 11px; z-index: 10; pointer-events: none; }
  .legend-row { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; color: rgba(255,255,255,0.7); }
  .legend-row:last-child { margin-bottom: 0; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  #panel { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(180deg, rgba(10,22,40,0.0) 0%, rgba(10,22,40,0.97) 18%); padding: 40px 16px 16px; z-index: 10; pointer-events: none; }
  #panel-card { background: rgba(13,27,42,0.96); border: 1px solid rgba(255,255,255,0.12); border-radius: 12px; padding: 16px 18px; pointer-events: all; display: none; backdrop-filter: blur(8px); position: relative; max-width: 520px; }
  #panel-card.visible { display: block; }
  #panel-name { font-size: 16px; font-weight: bold; color: #fff; margin-bottom: 4px; }
  #panel-type { font-size: 11px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
  #panel-desc { font-size: 13px; color: rgba(255,255,255,0.65); line-height: 1.6; margin-bottom: 12px; }
  #panel-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
  #panel-link { display: inline-block; font-size: 12px; font-weight: bold; color: #00b4d8; text-decoration: none; border: 1px solid rgba(0,180,216,0.35); border-radius: 6px; padding: 6px 14px; }
  #panel-directions { display: inline-block; font-size: 12px; font-weight: bold; color: #6bde8f; text-decoration: none; border: 1px solid rgba(107,222,143,0.35); border-radius: 6px; padding: 6px 14px; }
  #panel-directions:hover { background: rgba(107,222,143,0.1); }
  #panel-link:hover { background: rgba(0,180,216,0.1); }
  #panel-close { position: absolute; top: 12px; right: 14px; font-size: 18px; color: rgba(255,255,255,0.4); cursor: pointer; line-height: 1; }
  .gm-style-cc, .gm-bundled-control { display: none !important; }
</style>
</head>
<body>

<div id="header">
  <div class="dot-home"></div>
  <div>
    <div class="title">Grocery Stores Near Pelican Beach Resort — Tap any pin to explore</div>
    <div class="sub">9 stores with details, hours & directions — Destin, FL</div>
  </div>
</div>

<div id="filters">
  <button class="filter-btn active" data-cat="all"     onclick="applyFilter('all', this)">🛒 All</button>
  <button class="filter-btn" data-cat="chain"          onclick="applyFilter('chain', this)">🏬 Chain / Full-Service</button>
  <button class="filter-btn" data-cat="premium"        onclick="applyFilter('premium', this)">🌿 Premium / Specialty</button>
  <button class="filter-btn" data-cat="local"          onclick="applyFilter('local', this)">🦐 Local Gems</button>
  <button class="filter-btn" data-cat="warning"        onclick="applyFilter('warning', this)">⚠️ Heads Up</button>
</div>

<div id="map-container">
  <div id="map"></div>

  <div id="legend">
    <div class="legend-row"><div class="legend-dot" style="background:#00d4ff;box-shadow:0 0 5px #00d4ff;"></div>Pelican Beach Resort</div>
    <div class="legend-row"><div class="legend-dot" style="background:#6bde8f;"></div>Chain / Full-Service</div>
    <div class="legend-row"><div class="legend-dot" style="background:#f97316;"></div>Premium / Specialty</div>
    <div class="legend-row"><div class="legend-dot" style="background:#e879a0;"></div>Local Gems</div>
    <div class="legend-row"><div class="legend-dot" style="background:#ffd93d;"></div>Heads Up</div>
  </div>

  <div id="panel">
    <div id="panel-card">
      <span id="panel-close">&times;</span>
      <div id="panel-name"></div>
      <div id="panel-type"></div>
      <div id="panel-desc"></div>
      <div id="panel-buttons">
        <a id="panel-link" href="#" target="_blank" rel="noopener">🌐 Visit Website</a>
        <a id="panel-directions" href="#" target="_blank" rel="noopener">📍 Get Directions</a>
      </div>
    </div>
  </div>
</div>

<script>
const R = [
  // ── HOME BASE ──────────────────────────────────────────────────────────────
  {
    name:"Pelican Beach Resort", cat:"home",
    type:"HOME BASE", typeColor:"#00d4ff",
    lat:30.3845948, lng:-86.4745738,
    pinColor:"#00d4ff", isHome:true,
    desc:"Your home base — Unit 707 & Unit 1006. Step off the elevator onto the Gulf. All grocery stores below are within 15 minutes.",
    url:"https://www.destincondogetaways.com"
  },
  // ── CHAIN / FULL-SERVICE ───────────────────────────────────────────────────
  {
    name:"Winn-Dixie", cat:"warning",
    type:"GROCERY · 4.3★ · ⚠️ HEADS UP", typeColor:"#ffd93d",
    lat:30.3901481, lng:-86.47784419999999,
    pinColor:"#ffd93d",
    desc:"Closest standard supermarket to the resort. Solid selection, good deli counter, hot bar, beer and wine. Beach accessories stocked too. ⚠️ Converting to Aldi — Apr/May 2026. Verify before your trip.",
    url:"https://www.winndixie.com"
  },
  {
    name:"Publix — Main Street (Harbor Blvd)", cat:"chain",
    type:"SUPERMARKET · 4.7★", typeColor:"#6bde8f",
    lat:30.3919939, lng:-86.4847139,
    pinColor:"#6bde8f",
    desc:"Closest full-service Publix to the resort. Famous deli and Pub-Subs. Rotating BOGO deals worth checking. Friendly staff, well-stocked. Best for a quick top-up or arrival-day essentials.",
    url:"https://www.publix.com"
  },
  {
    name:"Publix — Destin Commons", cat:"chain",
    type:"SUPERMARKET · 4.5★", typeColor:"#6bde8f",
    lat:30.3904165, lng:-86.43016999999999,
    pinColor:"#6bde8f",
    desc:"Larger Publix location at Destin Commons. Same great deli and BOGO deals. Right next to Target and The Fresh Market — good stop for a full arrival-day haul. Ample parking.",
    url:"https://www.publix.com"
  },
  {
    name:"Walmart Supercenter", cat:"chain",
    type:"SUPERCENTER · 4.2★", typeColor:"#6bde8f",
    lat:30.3895031, lng:-86.44940869999999,
    pinColor:"#6bde8f",
    desc:"Open 24 hours. Full grocery section plus beach gear, sunscreen, floaties, chairs, coolers — everything for the week at the best prices. Great for a big arrival-day haul when budget matters.",
    url:"https://www.walmart.com/store/1362-destin-fl"
  },
  {
    name:"Target", cat:"chain",
    type:"TARGET GROCERY · 4.2★", typeColor:"#6bde8f",
    lat:30.3912672, lng:-86.48148979999999,
    pinColor:"#6bde8f",
    desc:"Good grocery section for snacks, drinks and essentials. Pharmacy on-site. Pair with Publix next door at Destin Commons for a complete stock-up. Pleasant open-air shopping center.",
    url:"https://www.target.com"
  },
  // ── PREMIUM / SPECIALTY ────────────────────────────────────────────────────
  {
    name:"Whole Foods Market", cat:"premium",
    type:"ORGANIC / PREMIUM · 4.4★", typeColor:"#f97316",
    lat:30.3903014, lng:-86.4202985,
    pinColor:"#f97316",
    desc:"Organic produce, excellent prepared foods counter, great wine and cheese selection. Prime members get discounts. Good arrival-day choice if you want quality over quantity.",
    url:"https://www.wholefoodsmarket.com"
  },
  {
    name:"The Fresh Market", cat:"premium",
    type:"PREMIUM GROCERY · 4.5★", typeColor:"#f97316",
    lat:30.388712, lng:-86.436839,
    pinColor:"#f97316",
    desc:"Premium butcher counter, artisan cheeses, specialty wines, and excellent prepared foods. Best source for a proper dinner at the condo — quality across the board on meats and produce.",
    url:"https://www.thefreshmarket.com"
  },
  // ── LOCAL GEMS ─────────────────────────────────────────────────────────────
  {
    name:"Destin Euro Market", cat:"local",
    type:"LOCAL GEM · 4.6★ · EASTERN EUROPEAN", typeColor:"#e879a0",
    lat:30.39074189999999, lng:-86.4870584,
    pinColor:"#e879a0",
    desc:"A local gem most tourists never find. Eastern European imports — Bulgarian and Polish cheeses, smoked meats, specialty chocolates, sausages, imported breads. Very close to the resort.",
    url:"https://www.google.com/maps/search/Destin+Euro+Market+743+Harbor+Blvd+Destin+FL"
  },
  {
    name:"Destin Ice Seafood Market & Deli", cat:"local",
    type:"LOCAL SEAFOOD MARKET · 4.5★", typeColor:"#e879a0",
    lat:30.391562, lng:-86.491028,
    pinColor:"#e879a0",
    desc:"Fresh local Gulf catch, properly handled. Best stop if you want to cook fresh grouper or shrimp in your condo kitchen. A proper Destin experience — buy what came off the boat today.",
    url:"https://www.google.com/maps/search/Destin+Ice+Seafood+Market+663+Harbor+Blvd+Destin+FL"
  },
];

const CAT_COLORS = {
  home:    "#00d4ff",
  chain:   "#6bde8f",
  premium: "#f97316",
  local:   "#e879a0",
  warning: "#ffd93d",
};

let map, markers = [], activeFilter = "all";

function makePinSvg(color, isHome, label) {
  const glow = isHome ? `<circle cx="12" cy="12" r="11" fill="${color}" opacity="0.25"/>` : "";
  const text = (!isHome && label)
    ? `<text x="12" y="16" text-anchor="middle" font-size="9" font-weight="bold" fill="#0a1628" font-family="Arial">${label}</text>`
    : "";
  return {
    url: `data:image/svg+xml;charset=UTF-8,` + encodeURIComponent(
      `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
        ${glow}
        <circle cx="12" cy="12" r="${isHome ? 9 : 7}" fill="${color}" stroke="white" stroke-width="2"/>
        ${text}
      </svg>`
    ),
    scaledSize: new google.maps.Size(24, 24),
    anchor: new google.maps.Point(12, 12),
  };
}

function initMap() {
  map = new google.maps.Map(document.getElementById("map"), {
    center: { lat: 30.3880, lng: -86.4600 },
    zoom: 14,
    mapTypeId: "satellite",
    mapTypeControl: false,
    streetViewControl: false,
    fullscreenControl: false,
    scrollwheel: true,
    gestureHandling: "greedy",
    zoomControl: true,
    zoomControlOptions: {
      position: google.maps.ControlPosition.RIGHT_CENTER,
    },
  });

  R.forEach((r, i) => {
    const marker = new google.maps.Marker({
      position: { lat: r.lat, lng: r.lng },
      map,
      title: r.name,
      icon: makePinSvg(r.pinColor, r.isHome, r.isHome ? null : i),
      zIndex: r.isHome ? 999 : i,
    });

    marker.addListener("click", () => showPanel(r, marker));
    markers.push({ marker, data: r });
  });
}

function showPanel(r, marker) {
  document.getElementById("panel-name").textContent = r.name;
  const t = document.getElementById("panel-type");
  t.textContent = r.type;
  t.style.color = r.typeColor;
  document.getElementById("panel-desc").textContent = r.desc;

  const link = document.getElementById("panel-link");
  link.href = r.url;
  link.style.color = r.typeColor;
  link.style.borderColor = r.typeColor + "55";

  const dir = document.getElementById("panel-directions");
  if (r.isHome) {
    dir.style.display = "none";
  } else {
    dir.style.display = "inline-block";
    dir.href = `https://www.google.com/maps/dir/?api=1&destination=${r.lat},${r.lng}`;
  }

  document.getElementById("panel-card").classList.add("visible");
  map.panTo({ lat: r.lat + 0.003, lng: r.lng });
}

function hidePanel() {
  document.getElementById("panel-card").classList.remove("visible");
}

function applyFilter(cat, btn) {
  activeFilter = cat;
  if (btn) {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
  }
  markers.forEach(({ marker, data }) => {
    const visible = cat === "all" || data.cat === cat || data.isHome;
    marker.setMap(visible ? map : null);
  });
  hidePanel();
}

document.getElementById("panel-close").addEventListener("click", hidePanel);
</script>

<script>
  fetch('/api/maps-key')
    .then(r => r.json())
    .then(data => {
      const s = document.createElement('script');
      s.src = `https://maps.googleapis.com/maps/api/js?key=${data.key}&callback=initMap&loading=async`;
      s.async = true;
      s.defer = true;
      document.head.appendChild(s);
    });
</script>

</body>
</html>
